<ion-app>

  <ng-container *ngIf="isLoggedIn; else sinMenu">
    <div class="app-layout" [class.expanded]="sidebarExpanded">

      <div class="sidebar">
        <div class="sidebar-top">
          <img [src]="userPhoto" alt="User" class="avatar" />
          <div class="user-info" *ngIf="sidebarExpanded">
            <span class="name">{{ userName }}</span>
            <span class="sub">App de Finanzas</span>
          </div>
        </div>

        <nav class="sidebar-nav">
          <a *ngFor="let p of appPages" [routerLink]="p.url" routerLinkActive="active" class="nav-item"
            (click)="onNavClick()">
            <ion-icon [name]="p.icon"></ion-icon>
            <span class="nav-label" *ngIf="sidebarExpanded">{{ p.title }}</span>
          </a>
        </nav>

        <div class="sidebar-bottom">
          <button class="nav-item logout" (click)="onLogout(); onNavClick()">
            <ion-icon name="log-out-outline"></ion-icon>
            <span class="nav-label" *ngIf="sidebarExpanded">Cerrar Sesión</span>
          </button>
          <button class="toggle-btn" (click)="toggleSidebar()">
            <ion-icon [name]="sidebarExpanded ? 'chevron-back-outline' : 'chevron-forward-outline'"></ion-icon>
          </button>
        </div>
      </div>

      <div class="main-area">
        <ion-router-outlet></ion-router-outlet>
      </div>

    </div>
  </ng-container>

  <ng-template #sinMenu>
    <ion-router-outlet></ion-router-outlet>
  </ng-template>

</ion-app>
