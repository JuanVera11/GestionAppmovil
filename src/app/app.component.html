<ion-app>
  <ng-container *ngIf="isLoggedIn; else sinMenu">
    <div class="app-layout" [class.expanded]="sidebarExpanded">

      <div class="sidebar-overlay" *ngIf="sidebarExpanded" (click)="toggleSidebar()"></div>

      <div class="sidebar">
        <div class="sidebar-top">
          <img [src]="userPhoto" alt="User" class="avatar" />
          <div class="user-info">
            <span class="name">{{ userName }}</span>
            <span class="sub">App de Finanzas</span>
          </div>
        </div>

        <nav class="sidebar-nav">
          <a *ngFor="let p of appPages" [routerLink]="p.url" routerLinkActive="active" class="nav-item"
            (click)="onNavClick()">
            <ion-icon [name]="p.icon"></ion-icon>
            <span class="nav-label">{{ p.title }}</span>
          </a>
        </nav>

        <div class="sidebar-bottom">
          <button class="nav-item logout" (click)="onLogout(); onNavClick()">
            <ion-icon name="log-out-outline"></ion-icon>
            <span class="nav-label">Cerrar Sesión</span>
          </button>
        </div>
      </div>

      <div class="main-area">
        <button class="menu-fab" (click)="toggleSidebar()">
          <ion-icon name="menu-outline"></ion-icon>
        </button>
        <ion-router-outlet></ion-router-outlet>
      </div>

    </div>
  </ng-container>

  <ng-template #sinMenu>
    <ion-router-outlet></ion-router-outlet>
  </ng-template>
