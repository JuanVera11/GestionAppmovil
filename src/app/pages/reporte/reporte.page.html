<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>Análisis Financiero</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding gray-bg">
  <div class="stats-grid">
    <div class="stat-card main">
      <span class="label">Presupuesto Total</span>
      <h2 class="value">{{ formatMoney(resumen.totalAsignado) }}</h2>
    </div>
    <div class="stat-card">
      <span class="label">Gastado</span>
      <h2 class="value text-danger">{{ formatMoney(resumen.totalGastado) }}</h2>
    </div>
    <div class="stat-card">
      <span class="label">Disponible</span>
      <h2 class="value text-success">{{ formatMoney(resumen.ahorroEstimado) }}</h2>
    </div>
  </div>

  <div class="chart-container ion-margin-top">
    <h3>Presupuesto vs Gasto</h3>
    <canvas #barChart></canvas>
  </div>

  <div class="chart-container ion-margin-top">
    <h3>Distribución de Gastos</h3>
    <canvas #doughnutChart></canvas>
  </div>
</ion-content>
