<ion-content class="reporte-content">

  <div class="page-header">
    <div class="header-top">
      <button class="back-btn" (click)="router.navigate(['/dashboard'])">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>
      <h1>Análisis Financiero</h1>
      <div style="width:36px"></div>
    </div>

    <div class="resumen-row">
      <div class="resumen-card">
        <span class="resumen-label">Presupuesto</span>
        <span class="resumen-valor">{{ formatMoney(resumen.totalAsignado) }}</span>
      </div>
      <div class="resumen-divider"></div>
      <div class="resumen-card ingreso">
        <span class="resumen-label">Disponible</span>
        <span class="resumen-valor">{{ formatMoney(resumen.ahorroEstimado) }}</span>
      </div>
      <div class="resumen-divider"></div>
      <div class="resumen-card gasto">
        <span class="resumen-label">Gastado</span>
        <span class="resumen-valor">{{ formatMoney(resumen.totalGastado) }}</span>
      </div>
    </div>
  </div>

  <div class="charts-wrap">
    <div class="chart-card">
      <h3>Presupuesto vs Gasto</h3>
      <canvas #barChart></canvas>
    </div>
    <div class="chart-card">
      <h3>Distribución de Gastos</h3>
      <canvas #doughnutChart></canvas>
    </div>
  </div>

</ion-content>
