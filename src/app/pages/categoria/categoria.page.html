<ion-header class="ion-no-border">
  <ion-toolbar color="light">
    <ion-title class="main-title">Mis Categorías</ion-title>
    <ion-buttons slot="start">
      <ion-button (click)="router.navigate(['/dashboard'])">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="white-bg">

  <!-- Estado vacío -->
  <div *ngIf="categorias.length === 0" class="empty-state">
    <ion-icon name="pricetags-outline"></ion-icon>
    <p>No tienes categorías aún</p>
    <ion-button fill="outline" (click)="abrirFormulario()">Crear categoría</ion-button>
  </div>

  <!-- Lista de categorías -->
  <ion-list *ngIf="categorias.length > 0" lines="full" class="ion-no-padding">
    <ion-item-sliding *ngFor="let cat of categorias">
      <ion-item (click)="abrirFormulario(cat)" class="category-item">
        <div slot="start" class="icon-circle">
          <ion-icon name="pricetags-outline"></ion-icon>
        </div>

        <ion-label>
          <div class="row-header">
            <h2 class="cat-name">{{ cat.nombre }}</h2>
            <div class="bar-container">
              <ion-progress-bar
                [color]="getColor(cat)"
                [value]="getProgreso(cat)">
              </ion-progress-bar>
            </div>
          </div>
          <p class="cat-info">
            ${{ formatMoney(cat.valorAsignado) }} Asignado •
            ${{ formatMoney(cat.valorGasto) }} Gastado
          </p>
        </ion-label>

        <ion-icon name="chevron-forward-outline" slot="end" size="small" color="medium"></ion-icon>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="eliminar(cat.id)">
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button class="custom-fab" (click)="abrirFormulario()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
