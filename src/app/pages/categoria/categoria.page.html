<ion-content class="cat-content">

  <div class="page-header">
    <div class="header-top">
      <button class="back-btn" (click)="router.navigate(['/dashboard'])">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>
      <h1>Mis Categorías</h1>
      <div style="width:36px"></div>
    </div>
  </div>

  <div class="trans-lista">

    <div *ngIf="categorias.length === 0" class="empty-state">
      <div class="empty-icon">
        <ion-icon name="pricetags-outline"></ion-icon>
      </div>
      <h3>Sin categorías</h3>
      <p>Crea tu primera categoría</p>
    </div>

    <ion-item-sliding *ngFor="let cat of categorias">
      <ion-item (click)="abrirFormulario(cat)" class="trans-item">
        <div slot="start" class="trans-icon-wrap ingreso">
          <ion-icon name="pricetags-outline"></ion-icon>
        </div>
        <ion-label>
          <div class="trans-row-top">
            <span class="trans-nombre">{{ cat.nombre }}</span>
            <span class="trans-monto">{{ formatMoney(cat.valorAsignado) }}</span>
          </div>
          <div class="trans-row-bottom">
            <span class="trans-tag">
              <ion-icon name="trending-down-outline"></ion-icon>
              {{ formatMoney(cat.valorGasto) }} gastado
            </span>
            <span class="trans-fecha">
              {{ formatMoney(cat.valorAsignado - cat.valorGasto) }} restante
            </span>
          </div>
          <div class="bar-wrap">
            <ion-progress-bar [color]="getColor(cat)" [value]="getProgreso(cat)"></ion-progress-bar>
          </div>
        </ion-label>
        <ion-icon name="chevron-forward-outline" slot="end" size="small" color="medium"></ion-icon>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="eliminar(cat.id)">
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>

  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button class="fab-main" (click)="abrirFormulario()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
