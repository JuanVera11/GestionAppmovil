<ion-content class="login-content">
  <div class="login-container">
    <div class="login-card">
      <h1>Iniciar sesión</h1>

      <div class="form-group">
        <ion-label>Correo</ion-label>
        <ion-input type="email" placeholder="ejemplo@correo.com" class="custom-input" [(ngModel)]="email"></ion-input>
      </div>

      <div class="form-group">
        <ion-label>Contraseña</ion-label>
        <ion-input type="password" placeholder="********" class="custom-input" [(ngModel)]="password"></ion-input>
      </div>

      <ion-button expand="block" class="btn-primary" (click)="onLogin()">INICIAR SESIÓN</ion-button>

      <div class="error-text" *ngIf="errorMsg">{{ errorMsg }}</div>

      <div class="links-container">
        <a class="forgot-password">¿Olvidaste tu contraseña?</a>
        <p class="register-link">¿No tienes cuenta?<a href="/register" class="register-link-text">Crear cuenta</a></p>
      </div>
    </div>
  </div>
</ion-content>
